<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gurkirat Github</title>
    <style>
        body {
            font-family: arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #caf1ee;
        }
        header {
            background-color: #333;
            color: #fff;
            /* padding: 1rem; */
            padding: 1px;
            text-align: center;
        }
        .welcome-header{
            font-family:cursive;
        }
        .welcome-header:hover{
            color: black;   
            /* box-shadow: 3px 3px 5px blue; */
            /* margin: 1px; */
        }
        main {
            padding: 2rem;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1 class="welcome-header">welcome to my git web hosting</h1>
    </header>
    <main>
        <p>This is a simple html page hosted on git.</p>
    </main>
    <footer>
        <p>&copy; <span id="year"></span> Gurkirat Singh. all rights reserved.</p>
    </footer>
    <script>
        document.getelementbyid('year').textcontent = new date().getfullyear();
    </script>
</body>
</html>
